# Minimal conda env for benchmark/bench.py and benchmark/temp_quench.py
# (OpenMM, NumPy, pandas, ParmEd, GPU stats via nvidia-ml-py, Excel via openpyxl)
name: bioenv
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - pandas
  - parmed
  - openmm
  - openpyxl
  - nvidia-ml-py
