# Input files
psffile = setup/your_system.psf
corfile = setup/your_system.cor
prmfile = setup/your_forcefield.xml

# Output
outname = test_run
traj_dir = traj

# Simulation protocol
temp_heating = 600
heating_steps = 1000000
temp_prod = 300
mdsteps = 20000000

# Replicas
n_copies = 1

# Platform
use_gpu = yes
ppn = 1

# Output/checkpoint frequency
nstxout = 5000
nstlog = 5000
nstchk = 50000

# Restart options
restart = no
checkpoint_file = traj/test_run.chk

# v2-only (ignored by temp_quench.py)
restraint_idx = 1-100
restraint_k = 1000.0
